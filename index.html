<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta de Resíduos</title>

    <link rel="stylesheet" href="css/style_coleta.css">
    <script src="js/script.js" defer></script>
</head>
<body>

    <div id="geral">

        <h2>Sistema de Coleta de Resíduos</h2>

        <div id="div-metas">
            <h3>Metas de Premiação</h3>

            <p>Valor da tonelada: <strong>R$ 220,00</strong></p>

            <p>Até 1.000 toneladas -> Sem premiação</p>
            <p>De 1.001 até 10.000 toneladas -> 8%</p>
            <p>De 10.001 até 15.000 toneladas -> 10%</p>
            <p>De 15.001 até 25.000 toneladas -> 15%</p>
            <p>Acima de 25.000 toneladas -> 20%</p>
        </div>

        <div id="div-form-empresa">

            <form id="form-empresa">

                <label for="empresa">Descrição da Empresa</label>
                <input
                    type="text"
                    id="empresa" required>

                <label for="quantidade">Quantidade Recolhida (toneladas)</label>
                <input type="number" id="quantidade" min="1" required>

                <button type="submit">Cadastrar</button>
                <button type="reset">Limpar</button>

            </form>

        </div>

        <hr>

        <h3>Empresas Cadastradas</h3>

        <div id="div-lista-empresas">

        </div>

    </div>

</body>
</html>
